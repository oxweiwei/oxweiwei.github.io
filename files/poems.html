<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古诗词赏析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "SimSun", "宋体", serif;
            background-color: #f5f3ee;
            color: #2c2c2c;
            padding: 40px 20px;
            line-height: 1.8;
        }
        .main-title {
            text-align: center;
            font-size: 32px;
            color: #8b2323;
            margin-bottom: 50px;
        }
        .poem-card {
            max-width: 600px;
            margin: 0 auto 40px auto;
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .poem-title {
            font-size: 26px;
            text-align: center;
            color: #8b2323;
            margin-bottom: 8px;
        }
        .poem-author {
            text-align: center;
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }
        .poem-content {
            font-size: 18px;
            text-align: center;
        }
        .poem-content p {
            margin: 10px 0;
        }
        .poem-desc {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 15px;
            color: #555;
        }
        /* 个人笔记专属样式 */
        .my-note {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            font-size: 15px;
            color: #2c3e50;
        }
        /* 参考链接样式 */
        .ref-link {
            margin-top: 15px;
            font-size: 14px;
        }
        .ref-link a {
            color: #0066cc;
            text-decoration: none;
        }
        .ref-link a:hover {
            text-decoration: underline;
            color: #8b2323;
        }
    </style>
</head>
<body>
    <h1 class="main-title">古风诗词集</h1>

    <div class="poem-card">
        <div class="poem-title">关山月</div>
        <div class="poem-author">唐 · 李白</div>
        <div class="poem-content">
            <p>明月出天山，苍茫云海间。</p>
            <p>长风几万里，吹度玉门关。</p>
            <p>汉下白登道，胡窥青海湾。</p>
            <p>由来征战地，不见有人还。</p>
            <p>戍客望边邑，思归多苦颜。</p>
            <p>高楼当此夜，叹息未应闲。</p>
        </div>

        <!-- 官方赏析 -->
        <div class="poem-desc">
            赏析：全诗意境雄浑苍茫，明月天山、长风万里，写边塞辽阔，抒征人乡愁、闺中怀远，苍凉而深沉。
        </div>

        <!-- 你的私人注释、学习笔记 写这里 -->
        <div class="my-note">
            <strong>我的笔记：</strong>
            1. “长风几万里，吹度玉门关”气势极开阔，格局宏大。
            2. 前四句写景，后四句写人、写乡愁，由景入情。
            3. 适合静心品读，人生境遇亦有山河苍茫之感。
        </div>

        <!-- 参考文档链接 -->
        <div class="ref-link">
            参考文档：
            <a href="https://www.guwendao.net/shiwenv_b12f5b4193fd.aspx" target="_blank">古诗文网-关山月</a>
        </div>
    </div>

</body>
</html>
