<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语录集 | Boxz</title>
    <!-- 引入Tailwind CSS简化样式编写 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入字体图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#4A5568',
                        accent: '#9F7AEA',
                        light: '#F7FAFC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Noto Serif SC', 'serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .quote-card {
                @apply bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow duration-300 p-6 mb-6 border-l-4 border-accent;
            }
            .quote-text {
                @apply text-xl md:text-2xl font-serif text-primary mb-4 leading-relaxed;
            }
            .quote-meta {
                @apply text-sm text-secondary flex items-center justify-between;
            }
            .container-custom {
                @apply max-w-3xl mx-auto px-4 py-8;
            }
        }
    </style>
</head>
<body class="bg-light min-h-screen">
    <header class="bg-primary text-white py-6 mb-8">
        <div class="container-custom">
            <h1 class="text-3xl font-bold flex items-center">
                <i class="fa fa-book mr-3"></i>
                语录集
            </h1>
            <p class="mt-2 text-gray-300">记录所思所想，留存点滴感悟</p>
        </div>
    </header>

    <main class="container-custom">
        <!-- 语录卡片列表 -->
        <div class="quote-list space-y-4">
            <!-- 第一条语录 -->
            <div class="quote-card">
                <p class="quote-text">苦功，内功，外功。</p>
                <div class="quote-meta">
                    <span><i class="fa fa-user mr-1"></i> boxz</span>
                    <span><i class="fa fa-calendar mr-1"></i> 2026-03-02</span>
                </div>
            </div>

            <!-- 第一条语录 -->
<div class="quote-card">
    <p class="quote-text">
        苦功<sup><i class="fa fa-question-circle text-accent cursor-help" title="反人性的刻意练习，执行力；"></i></sup>，
        内功<sup><i class="fa fa-question-circle text-accent cursor-help" title="内功练心法，求通透。内在的认知、思维。"></i></sup>，
        外功<sup><i class="fa fa-question-circle text-accent cursor-help" title="外功练技能、招式，熟能生巧；"></i></sup>。
    </p>
    <div class="quote-meta">
        <span><i class="fa fa-user mr-1"></i> boxz</span>
        <span><i class="fa fa-calendar mr-1"></i> 2026-03-02</span>
    </div>
</div>

            <!-- 第二条语录 -->
            <div class="quote-card">
                <p class="quote-text">毕竟几人真得鹿，不知终日梦为鱼</p>
                <div class="quote-meta">
                    <span><i class="fa fa-user mr-1"></i> boxz</span>
                    <span><i class="fa fa-calendar mr-1"></i> 2026-03-01</span>
                </div>
            </div>

            <!-- 新增语录时，直接复制上面的卡片结构修改内容即可 -->
            <!-- 
            <div class="quote-card">
                <p class="quote-text">这里填写新的语录内容</p>
                <div class="quote-meta">
                    <span><i class="fa fa-user mr-1"></i> boxz</span>
                    <span><i class="fa fa-calendar mr-1"></i> 2026-XX-XX</span>
                </div>
            </div>
            -->
        </div>

        <!-- 底部提示 -->
        <div class="mt-12 text-center text-secondary text-sm">
            <p>最后更新：2026-03-02</p>
            <p class="mt-1"><i class="fa fa-pencil"></i> 可直接在HTML中添加新的语录卡片</p>
        </div>
    </main>

    <footer class="mt-16 bg-primary text-white py-4 text-center text-sm">
        <p>© 2026 boxz 语录集 | 简单记录，用心生活</p>
    </footer>
</body>
</html>
